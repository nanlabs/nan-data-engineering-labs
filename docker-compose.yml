version: '3.8'

services:
  # LocalStack - AWS services emulator (Community Edition - Free)
  localstack:
    container_name: cloud-de-localstack
    image: localstack/localstack:latest
    ports:
      - "4566:4566"            # LocalStack Gateway
      - "4510-4559:4510-4559"  # External services port range
    environment:
      - SERVICES=s3,lambda,dynamodb,sqs,sns,kinesis,secretsmanager,iam,cloudformation,sts,logs,events
      - DEBUG=1
      - DATA_DIR=/tmp/localstack/data
      - LAMBDA_EXECUTOR=docker-reuse
      - DOCKER_HOST=unix:///var/run/docker.sock
      - AWS_DEFAULT_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - "${LOCALSTACK_VOLUME_DIR:-./localstack-volume}:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./shared/infrastructure/localstack-init:/etc/localstack/init/ready.d"
    networks:
      - cloud-de-network

  # MinIO - S3-compatible object storage
  minio:
    container_name: cloud-de-minio
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - cloud-de-network

  # Kafka - Event streaming platform (replaces Kinesis/MSK)
  zookeeper:
    container_name: cloud-de-zookeeper
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - cloud-de-network

  kafka:
    container_name: cloud-de-kafka
    image: confluentinc/cp-kafka:latest
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - cloud-de-network

  # PostgreSQL - Database (replaces RDS/Redshift for local dev)
  postgres:
    container_name: cloud-de-postgres
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cloudde
      POSTGRES_PASSWORD: cloudde123
      POSTGRES_DB: data_warehouse
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./shared/infrastructure/postgres-init:/docker-entrypoint-initdb.d
    networks:
      - cloud-de-network

  # Trino - Distributed SQL query engine (replaces Athena)
  trino:
    container_name: cloud-de-trino
    image: trinodb/trino:latest
    ports:
      - "8080:8080"
    volumes:
      - ./shared/infrastructure/trino-config:/etc/trino
    networks:
      - cloud-de-network

  # Spark Master (replaces EMR/Glue for local dev)
  spark-master:
    container_name: cloud-de-spark-master
    image: bitnami/spark:latest
    ports:
      - "8081:8080"
      - "7077:7077"
    environment:
      - SPARK_MODE=master
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    networks:
      - cloud-de-network

  spark-worker:
    container_name: cloud-de-spark-worker
    image: bitnami/spark:latest
    depends_on:
      - spark-master
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
    networks:
      - cloud-de-network

volumes:
  minio-data:
  postgres-data:

networks:
  cloud-de-network:
    driver: bridge

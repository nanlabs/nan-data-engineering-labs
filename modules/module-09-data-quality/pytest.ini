# Pytest configuration for Module 09: Data Quality

[tool:pytest]
minversion = 7.0
testpaths = validation
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers para organizar tests
markers =
    smoke: Quick smoke tests
    profiling: Data profiling tests
    validation: Data validation tests
    great_expectations: Great Expectations tests
    anomaly_detection: Anomaly detection tests
    monitoring: Quality monitoring tests
    integration: Integration tests
    slow: Tests that take significant time

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --cov=.
    --cov-report=html
    --cov-report=term-missing

# Coverage configuration
[coverage:run]
source = .
omit =
    */tests/*
    */validation/*
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = true
skip_covered = false

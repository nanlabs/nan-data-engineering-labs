version: '3.8'

services:
  localstack:
    image: localstack/localstack:latest
    container_name: localstack-module-02
    ports:
      - "4566:4566"
      - "4571:4571"
    environment:
      - SERVICES=s3,glue,athena,iam,logs,cloudformation
      - DEBUG=1
      - LAMBDA_EXECUTOR=local
      - PERSISTENCE=1
      - DATA_DIR=/tmp/localstack/data
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_DEFAULT_REGION=us-east-1
    volumes:
      - ./localstack-data:/tmp/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - storage-training-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  storage-training-network:
    driver: bridge

volumes:
  localstack-data:

[pytest]
pythonpath = ..
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    dag_validation: Tests for DAG validation (no import errors, no cycles)
    integration: Integration tests requiring external services
    slow: Slow running tests
    unit: Fast unit tests

addopts =
    -v
    --strict-markers
    --tb=short
    --cov=../exercises
    --cov-report=term-missing
    --cov-report=html

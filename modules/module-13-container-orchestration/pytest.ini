# pytest configuration for Module 13 tests

[pytest]
testpaths = validation
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

markers =
    docker: Docker-related tests
    ecs: ECS infrastructure tests
    kubernetes: Kubernetes tests
    integration: Integration tests
    unit: Unit tests

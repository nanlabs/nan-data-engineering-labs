# ============================================================================
# Docker Compose - Data Lakehouse Infrastructure
# Module 05: Data Lakehouse Architecture
# ============================================================================
#
# Services:
# - spark-master: Apache Spark master node
# - spark-worker: Apache Spark worker node(s)
# - minio: S3-compatible object storage
# - postgres: Hive Metastore database
# - hive-metastore: Hive Metastore service
# - jupyter: JupyterLab with PySpark
#
# Networks:
# - lakehouse-network: Internal network for all services
#
# Volumes:
# - minio-data: MinIO data persistence
# - postgres-data: PostgreSQL data persistence
# - spark-warehouse: Spark warehouse directory
#
# ============================================================================

version: '3.8'

services:
  # ==========================================================================
  # MinIO: S3-Compatible Object Storage
  # ==========================================================================
  minio:
    image: minio/minio:latest
    container_name: lakehouse-minio
    hostname: minio
    ports:
      - "9000:9000"      # API
      - "9001:9001"      # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      MINIO_REGION_NAME: us-east-1
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
      - ./minio/init-buckets.sh:/init-buckets.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - lakehouse-network

  # Create MinIO buckets on startup
  minio-init:
    image: minio/mc:latest
    container_name: lakehouse-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc config host add minio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb minio/lakehouse --ignore-existing;
      /usr/bin/mc mb minio/bronze --ignore-existing;
      /usr/bin/mc mb minio/silver --ignore-existing;
      /usr/bin/mc mb minio/gold --ignore-existing;
      /usr/bin/mc mb minio/warehouse --ignore-existing;
      /usr/bin/mc anonymous set download minio/lakehouse;
      echo 'MinIO buckets created successfully';
      "
    networks:
      - lakehouse-network

  # ==========================================================================
  # PostgreSQL: Hive Metastore Backend
  # ==========================================================================
  postgres:
    image: postgres:14-alpine
    container_name: lakehouse-postgres
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
      POSTGRES_DB: metastore
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse-network

  # ==========================================================================
  # Hive Metastore: Metadata Service for Delta Lake/Iceberg
  # ==========================================================================
  hive-metastore:
    image: apache/hive:3.1.3
    container_name: lakehouse-hive-metastore
    hostname: hive-metastore
    depends_on:
      - postgres
    ports:
      - "9083:9083"
    environment:
      DB_DRIVER: postgres
      SERVICE_NAME: metastore
      METASTORE_DB_HOSTNAME: postgres
      METASTORE_DB_USER: hive
      METASTORE_DB_PASSWORD: hive
      METASTORE_DB_NAME: metastore
      METASTORE_DB_PORT: 5432
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
    command: >
      /bin/bash -c "
      /opt/hive/bin/schematool -dbType postgres -initSchema;
      /opt/hive/bin/hive --service metastore
      "
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9083"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - lakehouse-network

  # ==========================================================================
  # Spark Master: Cluster Manager
  # ==========================================================================
  spark-master:
    image: bitnami/spark:3.5.0
    container_name: lakehouse-spark-master
    hostname: spark-master
    depends_on:
      - minio
      - hive-metastore
    ports:
      - "8080:8080"      # Spark Master Web UI
      - "7077:7077"      # Spark Master port
      - "4040:4040"      # Spark Application UI
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      # S3/MinIO Configuration
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      # Hive Metastore
      - HIVE_METASTORE_URIS=thrift://hive-metastore:9083
    volumes:
      - ./spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf
      - ./spark/log4j.properties:/opt/bitnami/spark/conf/log4j.properties
      - spark-warehouse:/opt/spark-warehouse
      - ./spark/jars:/opt/bitnami/spark/jars/custom
    networks:
      - lakehouse-network

  # ==========================================================================
  # Spark Worker: Executor Node
  # ==========================================================================
  spark-worker:
    image: bitnami/spark:3.5.0
    container_name: lakehouse-spark-worker
    hostname: spark-worker
    depends_on:
      - spark-master
    ports:
      - "8081:8081"      # Spark Worker Web UI
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=4G
      - SPARK_WORKER_WEBUI_PORT=8081
      - SPARK_RPC_AUTHENTICATION_ENABLED=no
      - SPARK_RPC_ENCRYPTION_ENABLED=no
      - SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED=no
      - SPARK_SSL_ENABLED=no
      # S3/MinIO Configuration
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      # Hive Metastore
      - HIVE_METASTORE_URIS=thrift://hive-metastore:9083
    volumes:
      - ./spark/spark-defaults.conf:/opt/bitnami/spark/conf/spark-defaults.conf
      - ./spark/log4j.properties:/opt/bitnami/spark/conf/log4j.properties
      - spark-warehouse:/opt/spark-warehouse
      - ./spark/jars:/opt/bitnami/spark/jars/custom
    networks:
      - lakehouse-network

  # ==========================================================================
  # Jupyter Lab: Interactive Development Environment
  # ==========================================================================
  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: lakehouse-jupyter
    hostname: jupyter
    depends_on:
      - spark-master
      - minio
    ports:
      - "8888:8888"      # Jupyter Lab
      - "4041:4041"      # Spark UI (alternate)
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - GRANT_SUDO=yes
      - SPARK_MASTER=spark://spark-master:7077
      # S3/MinIO Configuration
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_REGION=us-east-1
      - S3_ENDPOINT=http://minio:9000
      # Hive Metastore
      - HIVE_METASTORE_URIS=thrift://hive-metastore:9083
    volumes:
      - ./jupyter/jupyter_notebook_config.py:/home/jovyan/.jupyter/jupyter_notebook_config.py
      - ../../exercises:/home/jovyan/work/exercises
      - ../../data:/home/jovyan/work/data
      - ../../theory:/home/jovyan/work/theory
      - spark-warehouse:/opt/spark-warehouse
    command: >
      bash -c "
      pip install delta-spark==3.0.0 pyiceberg[pyarrow,s3fs]==0.6.0 great-expectations==0.18.8 &&
      start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''
      "
    networks:
      - lakehouse-network

# ============================================================================
# Networks
# ============================================================================
networks:
  lakehouse-network:
    driver: bridge
    name: lakehouse-network

# ============================================================================
# Volumes
# ============================================================================
volumes:
  minio-data:
    driver: local
  postgres-data:
    driver: local
  spark-warehouse:
    driver: local

# ============================================================================
# Usage Instructions
# ============================================================================
#
# Start all services:
#   docker-compose up -d
#
# View logs:
#   docker-compose logs -f [service-name]
#
# Stop all services:
#   docker-compose down
#
# Stop and remove volumes:
#   docker-compose down -v
#
# Scale Spark workers:
#   docker-compose up -d --scale spark-worker=3
#
# Access Services:
#   - Spark Master UI:    http://localhost:8080
#   - Spark Worker UI:    http://localhost:8081
#   - MinIO Console:      http://localhost:9001 (minioadmin/minioadmin)
#   - MinIO API:          http://localhost:9000
#   - Jupyter Lab:        http://localhost:8888
#   - Hive Metastore:     thrift://localhost:9083
#   - PostgreSQL:         localhost:5432 (hive/hive)
#
# ============================================================================

# ============================================================================
# Spark Configuration - Data Lakehouse
# ============================================================================
# This file configures Spark with Delta Lake, Apache Iceberg, and S3 support
# ============================================================================

# ----------------------------------------------------------------------------
# Spark Application Settings
# ----------------------------------------------------------------------------
spark.app.name                  DataLakehouse
spark.master                    spark://spark-master:7077
spark.submit.deployMode         client

# ----------------------------------------------------------------------------
# Executor Settings
# ----------------------------------------------------------------------------
spark.executor.memory           2g
spark.executor.cores            2
spark.executor.instances        2
spark.dynamicAllocation.enabled false

# ----------------------------------------------------------------------------
# Driver Settings
# ----------------------------------------------------------------------------
spark.driver.memory             2g
spark.driver.cores              2
spark.driver.maxResultSize      1g

# ----------------------------------------------------------------------------
# S3/MinIO Configuration (for object storage)
# ----------------------------------------------------------------------------
# Hadoop AWS configuration
spark.hadoop.fs.s3a.endpoint                    http://minio:9000
spark.hadoop.fs.s3a.access.key                  minioadmin
spark.hadoop.fs.s3a.secret.key                  minioadmin
spark.hadoop.fs.s3a.path.style.access           true
spark.hadoop.fs.s3a.impl                        org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.connection.ssl.enabled      false
spark.hadoop.fs.s3a.fast.upload                 true

# S3A Performance tuning
spark.hadoop.fs.s3a.block.size                  128M
spark.hadoop.fs.s3a.buffer.dir                  /tmp/s3a
spark.hadoop.fs.s3a.committer.name              directory
spark.hadoop.fs.s3a.committer.staging.conflict-mode replace
spark.hadoop.fs.s3a.threads.max                 20

# ----------------------------------------------------------------------------
# Delta Lake Configuration
# ----------------------------------------------------------------------------
# Delta Lake extensions (required for Delta Lake operations)
spark.sql.extensions                            io.delta.sql.DeltaSparkSessionExtension
spark.sql.catalog.spark_catalog                 org.apache.spark.sql.delta.catalog.DeltaCatalog

# Delta Lake features
spark.databricks.delta.retentionDurationCheck.enabled       false
spark.databricks.delta.properties.defaults.autoOptimize.optimizeWrite   true
spark.databricks.delta.properties.defaults.autoOptimize.autoCompact     true
spark.databricks.delta.schema.autoMerge.enabled                         true

# Delta Lake optimizations
spark.databricks.delta.optimize.maxFileSize             1073741824
spark.databricks.delta.optimize.minFileSize             134217728
spark.databricks.delta.optimize.repartition.enabled     true

# Delta Lake statistics
spark.databricks.delta.stats.collect                    true
spark.databricks.delta.stats.skipping                   true

# ----------------------------------------------------------------------------
# Apache Iceberg Configuration
# ----------------------------------------------------------------------------
# Iceberg catalog configuration
spark.sql.catalog.iceberg                               org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.iceberg.type                          hive
spark.sql.catalog.iceberg.uri                           thrift://hive-metastore:9083
spark.sql.catalog.iceberg.warehouse                     s3a://warehouse/iceberg
spark.sql.catalog.iceberg.io-impl                       org.apache.iceberg.aws.s3.S3FileIO

# Iceberg S3 configuration
spark.sql.catalog.iceberg.s3.endpoint                   http://minio:9000
spark.sql.catalog.iceberg.s3.path-style-access          true
spark.sql.catalog.iceberg.s3.access-key-id              minioadmin
spark.sql.catalog.iceberg.s3.secret-access-key          minioadmin

# Iceberg features
spark.sql.catalog.iceberg.cache-enabled                 true
spark.sql.catalog.iceberg.metrics-reporter-impl         org.apache.iceberg.metrics.LoggingMetricsReporter

# ----------------------------------------------------------------------------
# Hive Metastore Configuration
# ----------------------------------------------------------------------------
spark.sql.catalogImplementation                 hive
spark.hadoop.hive.metastore.uris                thrift://hive-metastore:9083
spark.sql.warehouse.dir                         s3a://warehouse/spark-warehouse
spark.sql.hive.metastore.version                3.1.3
spark.sql.hive.metastore.jars                   maven

# ----------------------------------------------------------------------------
# Parquet Configuration (optimizations for lakehouse)
# ----------------------------------------------------------------------------
spark.sql.parquet.compression.codec             snappy
spark.sql.parquet.mergeSchema                   false
spark.sql.parquet.filterPushdown                true
spark.sql.parquet.int96AsTimestamp              true
spark.sql.parquet.int96RebaseModeInRead         CORRECTED
spark.sql.parquet.int96RebaseModeInWrite        CORRECTED
spark.sql.parquet.datetimeRebaseModeInRead      CORRECTED
spark.sql.parquet.datetimeRebaseModeInWrite     CORRECTED

# ----------------------------------------------------------------------------
# Spark SQL Configuration
# ----------------------------------------------------------------------------
spark.sql.adaptive.enabled                      true
spark.sql.adaptive.coalescePartitions.enabled   true
spark.sql.adaptive.skewJoin.enabled             true
spark.sql.cbo.enabled                           true
spark.sql.statistics.histogram.enabled          true

# Shuffle settings
spark.sql.shuffle.partitions                    200
spark.default.parallelism                       8

# ----------------------------------------------------------------------------
# Serialization
# ----------------------------------------------------------------------------
spark.serializer                                org.apache.spark.serializer.KryoSerializer
spark.kryo.unsafe                               true
spark.kryoserializer.buffer.max                 2047m

# ----------------------------------------------------------------------------
# Network & Timeout Settings
# ----------------------------------------------------------------------------
spark.network.timeout                           300s
spark.executor.heartbeatInterval                20s
spark.rpc.askTimeout                            300s

# ----------------------------------------------------------------------------
# Event Logging (for Spark History Server)
# ----------------------------------------------------------------------------
spark.eventLog.enabled                          true
spark.eventLog.dir                              s3a://warehouse/spark-events
spark.history.fs.logDirectory                   s3a://warehouse/spark-events

# ----------------------------------------------------------------------------
# UI & Monitoring
# ----------------------------------------------------------------------------
spark.ui.enabled                                true
spark.ui.port                                   4040
spark.ui.reverseProxy                           false

# ----------------------------------------------------------------------------
# Checkpoint & Temporary Directories
# ----------------------------------------------------------------------------
spark.sql.streaming.checkpointLocation          s3a://warehouse/checkpoints
spark.local.dir                                 /tmp/spark

# ----------------------------------------------------------------------------
# Memory Management
# ----------------------------------------------------------------------------
spark.memory.fraction                           0.6
spark.memory.storageFraction                    0.5

# ----------------------------------------------------------------------------
# Security (disabled for local development)
# ----------------------------------------------------------------------------
spark.authenticate                              false
spark.network.crypto.enabled                    false

# ============================================================================
# Notes:
# ============================================================================
# 1. Delta Lake and Iceberg JARs must be available in Spark classpath
# 2. For production, adjust memory and core settings based on workload
# 3. Enable authentication and encryption for production environments
# 4. Monitor Spark UI (port 4040) for job execution details
# 5. MinIO credentials are for local development only
#
# Required JARs (download to spark/jars/ directory):
# - delta-core_2.12-3.0.0.jar
# - delta-storage-3.0.0.jar
# - iceberg-spark-runtime-3.5_2.12-1.4.3.jar
# - hadoop-aws-3.3.4.jar
# - aws-java-sdk-bundle-1.12.262.jar
# ============================================================================

# ============================================================================
# Log4j Configuration for Spark - Data Lakehouse
# ============================================================================
# This configuration reduces verbose logging for better readability
# ============================================================================

# Set root logger level to WARN (reduces noise)
log4j.rootCategory=WARN, console

# Console appender configuration
log4j.appender.console=org.apache.log4j.ConsoleAppender
log4j.appender.console.target=System.err
log4j.appender.console.layout=org.apache.log4j.PatternLayout
log4j.appender.console.layout.ConversionPattern=%d{yy/MM/dd HH:mm:ss} %p %c{1}: %m%n

# ----------------------------------------------------------------------------
# Spark Core Logging Levels
# ----------------------------------------------------------------------------
log4j.logger.org.apache.spark=WARN
log4j.logger.org.apache.spark.storage=WARN
log4j.logger.org.apache.spark.scheduler=WARN
log4j.logger.org.apache.spark.executor=WARN
log4j.logger.org.apache.spark.network=WARN

# ----------------------------------------------------------------------------
# Delta Lake Logging
# ----------------------------------------------------------------------------
log4j.logger.io.delta=INFO
log4j.logger.org.apache.spark.sql.delta=INFO

# ----------------------------------------------------------------------------
# Iceberg Logging
# ----------------------------------------------------------------------------
log4j.logger.org.apache.iceberg=INFO

# ----------------------------------------------------------------------------
# Hadoop & AWS S3 Logging (reduce verbosity)
# ----------------------------------------------------------------------------
log4j.logger.org.apache.hadoop=WARN
log4j.logger.org.apache.hadoop.fs.s3a=WARN
log4j.logger.com.amazonaws=ERROR

# ----------------------------------------------------------------------------
# Hive Metastore Logging
# ----------------------------------------------------------------------------
log4j.logger.org.apache.hive=WARN
log4j.logger.hive.metastore=WARN

# ----------------------------------------------------------------------------
# Parquet Logging
# ----------------------------------------------------------------------------
log4j.logger.org.apache.parquet=WARN

# ----------------------------------------------------------------------------
# Jetty (Spark UI) Logging - reduce noise
# ----------------------------------------------------------------------------
log4j.logger.org.spark_project.jetty=WARN
log4j.logger.org.spark_project.jetty.util.component.AbstractLifeCycle=ERROR

# ============================================================================
# Notes:
# ============================================================================
# Logging Levels (from most verbose to least):
# - TRACE: Very detailed logs (rarely used)
# - DEBUG: Detailed information for debugging
# - INFO:  Informational messages
# - WARN:  Warning messages (default for most components)
# - ERROR: Error messages only
# - FATAL: Fatal errors only
#
# To enable verbose logging for specific component, change to DEBUG or TRACE:
#   log4j.logger.io.delta=DEBUG
#
# For production, consider using WARN or ERROR for all components to reduce
# log volume and improve performance.
# ============================================================================

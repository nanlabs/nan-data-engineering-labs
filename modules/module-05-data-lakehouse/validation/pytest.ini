[pytest]
# Configuración de pytest para módulo 05

# Directorios de test
testpaths = .

# Patrones de archivos de test
python_files = test_*.py

# Patrones de clases de test
python_classes = Test*

# Patrones de funciones de test
python_functions = test_*

# Markers personalizados
markers =
    delta: tests específicos de Delta Lake
    iceberg: tests específicos de Iceberg (pueden requerir configuración adicional)
    slow: tests que tardan más tiempo
    integration: tests de integración completa
    unit: tests unitarios

# Opciones por defecto
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    
# Ignorar deprecation warnings de Spark/Delta
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Logging
log_cli = false
log_cli_level = INFO

# Coverage (opcional)
# addopts = --cov=../exercises --cov-report=html --cov-report=term

# Timeout para tests (opcional)
# timeout = 300

# Parallel execution (opcional, requiere pytest-xdist)
# addopts = -n auto

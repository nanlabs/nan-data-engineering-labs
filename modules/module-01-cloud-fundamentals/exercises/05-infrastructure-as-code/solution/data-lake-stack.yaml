AWSTemplateFormatVersion: '2010-09-09'
Description: 'QuickMart Data Lake Infrastructure - Complete Solution'

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
    Description: Deployment environment

  DataRetentionDays:
    Type: Number
    Default: 90
    MinValue: 30
    MaxValue: 365
    Description: Days to retain data in STANDARD storage before transitioning to STANDARD_IA

  GlacierTransitionDays:
    Type: Number
    Default: 180
    MinValue: 90
    MaxValue: 730
    Description: Days before transitioning to GLACIER storage

Conditions:
  IsProduction: !Equals [!Ref Environment, prod]
  IsDevelopment: !Equals [!Ref Environment, dev]
  EnableBackup: !Or
    - !Equals [!Ref Environment, prod]
    - !Equals [!Ref Environment, staging]

Resources:
  DataLakeBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: !If [IsProduction, Retain, Delete]
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub 'quickmart-data-lake-${Environment}-${AWS::AccountId}'

      VersioningConfiguration:
        Status: Enabled

      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

      LifecycleConfiguration:
        Rules:
          - Id: TransitionToIA
            Status: Enabled
            Prefix: ''
            Transitions:
              - TransitionInDays: !Ref DataRetentionDays
                StorageClass: STANDARD_IA
              - TransitionInDays: !Ref GlacierTransitionDays
                StorageClass: GLACIER

          - Id: DeleteOldVersions
            Status: Enabled
            Prefix: ''
            NoncurrentVersionExpirationInDays: 90

          - Id: CleanupIncompleteUploads
            Status: Enabled
            Prefix: ''
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: QuickMart-DataPlatform
        - Key: ManagedBy
          Value: CloudFormation
        - Key: CostCenter
          Value: Engineering
        - Key: DataClassification
          Value: Confidential

  DataLakeBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref DataLakeBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyUnencryptedObjectUploads
            Effect: Deny
            Principal: '*'
            Action: 's3:PutObject'
            Resource: !Sub '${DataLakeBucket.Arn}/*'
            Condition:
              StringNotEquals:
                s3:x-amz-server-side-encryption: 'AES256'

          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: 's3:*'
            Resource:
              - !GetAtt DataLakeBucket.Arn
              - !Sub '${DataLakeBucket.Arn}/*'
            Condition:
              Bool:
                aws:SecureTransport: false

          - Sid: AllowDataEngineerAccess
            Effect: Allow
            Principal:
              AWS: !GetAtt DataEngineerRole.Arn
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
              - s3:ListBucket
            Resource:
              - !GetAtt DataLakeBucket.Arn
              - !Sub '${DataLakeBucket.Arn}/*'

  DataEngineerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'data-engineer-role-${Environment}'
      Description: !Sub 'IAM role for data engineers in ${Environment} environment'

      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
                - lambda.amazonaws.com
            Action: 'sts:AssumeRole'

      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess
        - !If
          - IsProduction
          - arn:aws:iam::aws:policy/ReadOnlyAccess
          - !Ref AWS::NoValue

      Policies:
        - PolicyName: DataLakeAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: S3BucketAccess
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:GetObjectVersion
                Resource: !Sub '${DataLakeBucket.Arn}/*'

              - Sid: S3BucketList
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                  - s3:GetBucketVersioning
                Resource: !GetAtt DataLakeBucket.Arn

              - Sid: CloudWatchMetrics
                Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                  - cloudwatch:GetMetricData
                Resource: '*'

      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Project
          Value: QuickMart-DataPlatform

  DataAnalystRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub 'data-analyst-role-${Environment}'
      Description: !Sub 'Read-only IAM role for data analysts in ${Environment}'

      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - ec2.amazonaws.com
            Action: 'sts:AssumeRole'

      Policies:
        - PolicyName: DataLakeReadOnly
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt DataLakeBucket.Arn
                  - !Sub '${DataLakeBucket.Arn}/*'

      Tags:
        - Key: Environment
          Value: !Ref Environment

  # Conditional backup vault for production
  BackupVault:
    Type: AWS::Backup::BackupVault
    Condition: EnableBackup
    Properties:
      BackupVaultName: !Sub 'data-lake-backup-${Environment}'

Outputs:
  BucketName:
    Description: Data Lake S3 bucket name
    Value: !Ref DataLakeBucket
    Export:
      Name: !Sub '${AWS::StackName}-BucketName'

  BucketArn:
    Description: Data Lake S3 bucket ARN
    Value: !GetAtt DataLakeBucket.Arn
    Export:
      Name: !Sub '${AWS::StackName}-BucketArn'

  DataEngineerRoleArn:
    Description: IAM role ARN for data engineers
    Value: !GetAtt DataEngineerRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DataEngineerRoleArn'

  DataAnalystRoleArn:
    Description: IAM role ARN for data analysts
    Value: !GetAtt DataAnalystRole.Arn
    Export:
      Name: !Sub '${AWS::StackName}-DataAnalystRoleArn'

  Environment:
    Description: Deployment environment
    Value: !Ref Environment

  StackId:
    Description: CloudFormation stack ID
    Value: !Ref AWS::StackId

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sql-foundations-postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-dataengineer}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-training123}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=en_US.UTF-8"
      TZ: UTC

    ports:
      - "${POSTGRES_PORT:-5432}:5432"

    volumes:
      # Persist data
      - postgres_data:/var/lib/postgresql/data

      # Initialization scripts (run in alphabetical order)
      - ./init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

      # Optional: Custom postgresql.conf
      # - ./postgresql.conf:/etc/postgresql/postgresql.conf:ro

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dataengineer} -d ${POSTGRES_DB:-ecommerce}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    # Performance tuning (adjust based on your system)
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "log_statement=all"
      - "-c"
      - "log_duration=on"
      - "-c"
      - "log_min_duration_statement=100"

    networks:
      - sql-foundations-network

  # Optional: pgAdmin for GUI management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: sql-foundations-pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@training.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'

    ports:
      - "${PGADMIN_PORT:-5050}:80"

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - sql-foundations-network

    profiles:
      - gui  # Only start with: docker-compose --profile gui up

volumes:
  postgres_data:
    name: sql-foundations-postgres-data
  pgadmin_data:
    name: sql-foundations-pgadmin-data

networks:
  sql-foundations-network:
    name: sql-foundations-network
    driver: bridge

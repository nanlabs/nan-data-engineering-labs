[pytest]
# Pytest configuration for Module 08: Streaming Basics

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum version
minversion = 7.0

# Test paths
testpaths = validation

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --color=yes

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests requiring external services
    kafka: marks tests that require Kafka to be running
    flink: marks tests that require Apache Flink
    aws: marks tests that require AWS credentials
    unit: marks tests as unit tests (no external dependencies)

# Coverage options (optional)
# addopts = --cov=. --cov-report=html --cov-report=term

# Logging
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout (optional, requires pytest-timeout)
# timeout = 300
# timeout_method = thread

# Asyncio (for async tests)
asyncio_mode = auto

# Filterwarnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

[pytest]
# Configuración de pytest para el Módulo 04

# Directorio de tests
testpaths = exercises validation

# Patrón de archivos de test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Opciones por defecto
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

# Markers personalizados
markers =
    slow: tests que tardan más de 1 segundo
    integration: tests de integración entre componentes
    data: tests que usan datasets reales
    unit: tests unitarios rápidos
    exercise01: tests del ejercicio 01
    exercise02: tests del ejercicio 02
    exercise03: tests del ejercicio 03
    exercise04: tests del ejercicio 04
    exercise05: tests del ejercicio 05
    exercise06: tests del ejercicio 06

# Configuración de coverage
[coverage:run]
source = .
omit = 
    */tests/*
    */test_*
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = coverage_html_report

# Timeout para tests (evitar que se cuelguen)
timeout = 300

# Configuración de logging
log_cli = True
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Filtros de warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

version: '3.8'

# ============================================================================
# Module 04: Python for Data Engineering - Docker Compose Configuration
# ============================================================================
# Este archivo define la infraestructura para el módulo usando Docker Compose
# Incluye: Jupyter Lab, PostgreSQL (opcional), volúmenes persistentes
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # Jupyter Lab - Entorno principal de desarrollo
  # --------------------------------------------------------------------------
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: python-data-jupyter
    
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    
    environment:
      # Jupyter Configuration
      - JUPYTER_ENABLE_LAB=yes
      - JUPYTER_TOKEN=${JUPYTER_TOKEN:-python-data-2026}
      
      # Python Configuration
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      
      # Timezone
      - TZ=America/Santiago
    
    volumes:
      # Notebooks (persistente)
      - ./notebooks:/home/jovyan/work/notebooks
      
      # Data (persistente)
      - ../data:/home/jovyan/work/data
      
      # Exercises (read-only para evitar sobrescribir soluciones)
      - ../exercises:/home/jovyan/work/exercises:ro
      
      # Scripts (read-only)
      - ../scripts:/home/jovyan/work/scripts:ro
      
      # Assets (read-only)
      - ../assets:/home/jovyan/work/assets:ro
      
      # Configuración Python personalizada
      - ./jupyter_config.py:/home/jovyan/.jupyter/jupyter_lab_config.py
      
      # Instalar requirements del módulo
      - ../requirements.txt:/tmp/requirements.txt
    
    working_dir: /home/jovyan/work
    
    # Comando de inicio con instalación de dependencias
    command: >
      bash -c "
        pip install --no-cache-dir -r /tmp/requirements.txt &&
        start-notebook.sh
      "
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Restart policy
    restart: unless-stopped
    
    # Resource limits (ajustar según necesidad)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G
    
    networks:
      - python-data-network


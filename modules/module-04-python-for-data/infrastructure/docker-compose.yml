  #   driver: local
  
  # Datos MinIO (si se usa)
  # minio_data:
  #   driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  python-data-network:
    driver: bridge
    name: python-data-network

# ============================================================================
# Notas de Uso
# ============================================================================
# 
# Iniciar servicios:
#   docker-compose up -d
#
# Ver logs:
#   docker-compose logs -f jupyter
#
# Detener servicios:
#   docker-compose down
#
# Detener y eliminar volúmenes:
#   docker-compose down -v
#
# Reconstruir imagen:
#   docker-compose build --no-cache
#
# Acceder a Jupyter Lab:
#   http://localhost:8888
#   Token: Ver en .env o usar el default (python-data-2026)
#
# Acceder a container shell:
#   docker-compose exec jupyter bash
#
# Ver uso de recursos:
#   docker stats python-data-jupyter
#
# ============================================================================

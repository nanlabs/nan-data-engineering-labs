name: Dependabot Auto-Merge

on:
  pull_request:
    branches:
      - main
  workflow_run:
    workflows:
      - Validate Learning Labs Modules
    types:
      - completed

jobs:
  auto-merge-dependabot:
    name: Auto-merge Dependabot PRs
    runs-on: ubuntu-latest
    # Only run for Dependabot PRs
    if: |
      github.event.pull_request.user.login == 'dependabot[bot]' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.head_repository.owner.login == 'dependabot[bot]')

    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Get PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_run" ] && [ "${{ github.event.workflow_run.pull_requests[0].number }}" != "" ]; then
            echo "number=${{ github.event.workflow_run.pull_requests[0].number }}" >> $GITHUB_OUTPUT
          fi

      - name: Enable auto-merge for Dependabot PR
        if: steps.pr.outputs.number != ''
        run: |
          pr_number="${{ steps.pr.outputs.number }}"
          repo="${{ github.repository }}"

          echo "Processing PR #$pr_number..."
          sleep 2

          # Enable auto-merge if PR is ready
          gh pr merge "$pr_number" \
            --repo "$repo" \
            --auto \
            --merge \
            --delete-branch \
            --admin 2>&1 | grep -E "auto-merge|already|not|ready" || echo "Auto-merge request processed"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
